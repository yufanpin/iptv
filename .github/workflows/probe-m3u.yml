name: Probe IPTV.m3u (dry-run)

# 探活试跑：从 GitHub 海外 runner 探 IPTV.m3u 里的链接，只生成报告 probe-report.md、
# 不修改 IPTV.m3u。用来对比「海外 runner 视角」与「作者本机(国内)97/103」的差距，
# 判断探活该放海外还是国内跑。
on:
  workflow_dispatch: {}
  push:
    paths:
      - 'scripts/probe-m3u.mjs'
      - '.github/workflows/probe-m3u.yml'

permissions:
  contents: write

concurrency:
  group: probe-m3u
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Probe (dry-run, report only)
        run: node scripts/probe-m3u.mjs
        env:
          DRY_RUN: '1'

      - name: Write job summary
        if: always()
        run: cat probe-report.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Commit report back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add probe-report.md
          if git diff --cached --quiet; then
            echo "report unchanged, skip commit"
          else
            git commit -m "chore: probe report (dry-run) [skip ci]"
            git push
          fi
